services:
  - type: web
    name: ecomig-portal
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
